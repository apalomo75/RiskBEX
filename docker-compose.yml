services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.api
    container_name: riskbex-api
    environment:
      RISKBEX_DATA_DIR: /app/data
    volumes:
      - ./backend/data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  dashboard:
    build:
      context: ./backend
      dockerfile: Dockerfile.dashboard
    container_name: riskbex-dashboard
    environment:
      RISKBEX_API_URL: http://api:8000
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
